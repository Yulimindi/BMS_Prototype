<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BNK 부산은행 - 관리자 시스템</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ED1C24;
        }

        header h1 {
            font-size: 20px;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .btn-logout {
            color: #ccc;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #555;
            padding: 5px 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            color: #fff;
            border-color: #ED1C24;
            background-color: #ED1C24;
        }

        .admin-wrapper {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .menu-card {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .menu-header {
            background-color: #fafafa;
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
        }

        .menu-header h2 {
            margin: 0;
            font-size: 18px;
            color: #222;
        }

        .menu-list {
            padding: 10px 0;
        }

        .menu-item {
            display: block;
            padding: 20px 30px;
            text-decoration: none;
            color: #444;
            font-weight: 500;
            border-bottom: 1px solid #f5f5f5;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background-color: #fff8f8;
            color: #ED1C24;
            padding-left: 40px;
        }

        .menu-item::after {
            content: '→';
            font-size: 18px;
            opacity: 0.3;
        }

        .menu-item:hover::after {
            opacity: 1;
        }

        hr {
            display: none;
        }

        .security-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <header>
        <h1>BNK 관리자 시스템 <span style="font-weight: 300; font-size: 14px; margin-left: 10px; color: #aaa;">Admin Dashboard</span></h1>
        <a th:href="@{/logout}" class="btn-logout">안전 로그아웃</a>
    </header>

    <div class="admin-wrapper">
        <div class="menu-card">
            <div class="menu-header">
                <h2>관리 메뉴 설정</h2>
            </div>
            
            <div class="menu-list">
                <a th:href="@{/admin/members}" class="menu-item">
                    전체 회원 목록 조회
                </a>
                <a th:href="@{/member/mainPage}" class="menu-item">
                    멤버 페이지로 가기 (입금/송금용)
                </a>
                <a th:href="@{/admin/makeNotice}" class="menu-item">
                    공지 작성하기
                </a>
            </div>
        </div>

        <div class="security-footer">
            인증된 관리자 외에는 접근이 엄격히 제한됩니다. © BNK Busan Bank
        </div>
    </div>

</body>
</html>
