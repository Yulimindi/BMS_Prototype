<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BNK 부산은행 - 로그인</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: #ED1C24;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        hr {
            display: none;
        }

        form {
            text-align: left;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #ED1C24;
        }

        input[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #ED1C24;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        input[type="submit"]:hover {
            background-color: #c8161d;
        }

        .login-footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>BNK 부산은행</h1>
        <div class="subtitle">인터넷뱅킹 서비스 이용을 위해 로그인해 주세요.</div>
        
        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label>아이디</label>
                <input type="text" name="id" placeholder="아이디를 입력하세요">
            </div>
            
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호를 입력하세요">
            </div>
            
            <input type="submit" value="로그인">
        </form>

        <div class="login-footer">
            © BNK Busan Bank. All Rights Reserved.
        </div>
    </div>

    <script th:inline="javascript">
        if([[${login}]] != null) {
            alert([[${login}]]);
        }
    </script>
</body>
</html>
