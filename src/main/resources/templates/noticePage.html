<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BNK 부산은행 - 공지사항 상세</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #222;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }

        h1::before {
            content: '';
            width: 4px;
            height: 24px;
            background-color: #ED1C24;
            margin-right: 12px;
            border-radius: 2px;
        }

        hr {
            display: none;
        }

        .notice-view {
            width: 100%;
            border-top: 2px solid #333;
            border-collapse: collapse;
        }

        .notice-row {
            border-bottom: 1px solid #eee;
            display: flex;
        }

        .label {
            width: 150px;
            background-color: #f9f9f9;
            padding: 15px 20px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
            border-right: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        .content {
            flex: 1;
            padding: 15px 20px;
            font-size: 15px;
            color: #333;
            line-height: 1.6;
        }

        .content-area {
            min-height: 200px;
            align-items: flex-start !important;
        }

        .button-group {
            margin-top: 30px;
            text-align: center;
        }

        .btn-list {
            display: inline-block;
            padding: 10px 25px;
            background-color: #fff;
            color: #555;
            border: 1px solid #ccc;
            text-decoration: none;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-list:hover {
            background-color: #f4f4f4;
            border-color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>공지사항 상세내용</h1>
        
        <div class="notice-view">
            <div class="notice-row">
                <div class="label">공지번호</div>
                <div class="content">[[${notice.nid}]]</div>
            </div>
            
            <div class="notice-row" style="border-bottom: 1px solid #eee;">
                <div class="label">제목</div>
                <div class="content" style="font-weight: 700;">[[${notice.title}]]</div>
            </div>

            <div class="notice-row">
                <div class="label">작성일자</div>
                <div class="content">[[${notice.createdAt}]]</div>
            </div>
            
            <div class="notice-row content-area">
                <div class="label">내용</div>
                <div class="content">
                    [[${notice.content}]]
                </div>
            </div>
        </div>

        <div class="button-group">
            <a href="javascript:history.back()" class="btn-list">목록으로 돌아가기</a>
        </div>
    </div>

</body>
</html>
